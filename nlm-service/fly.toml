app = "inje-nlm-service"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  NOTEBOOKLM_HOME = "/data/nlm-cookies"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

[mounts]
  source = "nlm_data"
  destination = "/data/nlm-cookies"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
